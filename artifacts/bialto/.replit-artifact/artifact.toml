kind = "web"
previewPath = "/"
title = "The Bialto by Asemont Estate"
version = "1.0.0"
id = "artifacts/bialto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21406

[services.development]
run = "pnpm --filter @workspace/bialto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bialto", "run", "build" ]
publicDir = "artifacts/bialto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21406"
BASE_PATH = "/"
